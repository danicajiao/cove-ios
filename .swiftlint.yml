included:
  - Cove

excluded:
  - Pods
  - Cove.xcodeproj

opt_in_rules:
  - empty_count
  - force_unwrapping

disabled_rules:
  - trailing_whitespace
  - redundant_discardable_let

identifier_name:
  excluded:
    - xs
    - sm
    - md
    - lg
    - xl
    - x2l
    - x3l
    - x4l

line_length:
  warning: 200
  error: 250

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100
